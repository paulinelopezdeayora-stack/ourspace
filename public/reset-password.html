<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OURSPACE — Nouveau mot de passe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,400;0,700;1,400&display=swap">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#000814;font-family:'Comic Neue','Comic Sans MS',sans-serif;color:#e0e0ff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    .site-title{font-family:Impact,'Arial Black',sans-serif;font-size:2.2em;letter-spacing:8px;color:#ff00ff;text-shadow:0 0 8px #ff00ff;text-align:center;margin-bottom:6px}
    .site-sub{color:#9966cc;font-size:11px;text-align:center;letter-spacing:2px;margin-bottom:28px}
    .card{background:rgba(13,0,32,.92);border:2px solid #5500bb;border-radius:6px;width:100%;max-width:390px;padding:26px 28px}
    label{display:block;font-size:10px;color:#9966cc;text-transform:uppercase;margin-bottom:4px;margin-top:13px;font-family:Arial,sans-serif}
    input[type=password]{width:100%;background:#0d001a;border:1px solid #5500bb;color:#ddd;padding:9px 11px;font-family:'Comic Neue','Comic Sans MS',sans-serif;font-size:13px;border-radius:3px}
    input:focus{outline:none;border-color:#ff00ff;box-shadow:0 0 8px #ff00ff44}
    .btn{width:100%;margin-top:18px;padding:11px;background:linear-gradient(180deg,#330066,#1a0044);color:#fff;border:1px solid #9900ff;font-family:'Comic Neue','Comic Sans MS',sans-serif;font-size:14px;font-weight:bold;border-radius:3px;cursor:pointer;transition:all .2s}
    .btn:hover{background:#6600cc;box-shadow:0 0 14px #b300ff}
    .btn:disabled{opacity:.5;cursor:default}
    .msg{margin-top:12px;font-size:12px;text-align:center;min-height:18px}
  </style>
</head>
<body>
<div class="site-title">✦ OURSPACE ✦</div>
<div class="site-sub">réinitialisation du mot de passe</div>

<div class="card">
  <div id="view-form">
    <label>Nouveau mot de passe <span style="color:#444">(min 6 caractères)</span></label>
    <input type="password" id="pass1" placeholder="••••••••">
    <label>Confirmer</label>
    <input type="password" id="pass2" placeholder="••••••••">
    <button class="btn" onclick="doReset()">Changer mon mot de passe 🐻</button>
    <div class="msg" id="msg"></div>
  </div>
  <div id="view-done" style="display:none;text-align:center">
    <div style="font-size:40px;margin-bottom:12px">🐻</div>
    <div style="color:#44cc88;margin-bottom:16px">Mot de passe changé !</div>
    <a href="/login.html" style="color:#cc55bb">← Se connecter</a>
  </div>
  <div id="view-invalid" style="display:none;text-align:center">
    <div style="font-size:40px;margin-bottom:12px">😬</div>
    <div style="color:#ff4444;margin-bottom:16px">Lien invalide ou expiré.</div>
    <a href="/login.html" style="color:#cc55bb">← Retour connexion</a>
  </div>
</div>

<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) {
  document.getElementById('view-form').style.display = 'none';
  document.getElementById('view-invalid').style.display = 'block';
}

async function doReset() {
  const pass1 = document.getElementById('pass1').value;
  const pass2 = document.getElementById('pass2').value;
  const msg   = document.getElementById('msg');
  const btn   = document.querySelector('.btn');
  if (!pass1 || pass1.length < 6) { msg.style.color='#ff4444'; msg.textContent='Mot de passe trop court (min 6 car.)'; return; }
  if (pass1 !== pass2) { msg.style.color='#ff4444'; msg.textContent='Les mots de passe ne correspondent pas 😬'; return; }
  btn.disabled = true; btn.textContent = 'Enregistrement...';
  const r = await fetch('/api/auth/reset-password', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ token, password: pass1 }),
  });
  const d = await r.json();
  if (d.ok) {
    document.getElementById('view-form').style.display = 'none';
    document.getElementById('view-done').style.display = 'block';
  } else {
    msg.style.color = '#ff4444';
    msg.textContent = d.error || 'Erreur';
    btn.disabled = false; btn.textContent = 'Changer mon mot de passe 🐻';
    if (d.error?.includes('invalide') || d.error?.includes('expiré')) {
      document.getElementById('view-form').style.display = 'none';
      document.getElementById('view-invalid').style.display = 'block';
    }
  }
}
</script>
</body>
</html>
