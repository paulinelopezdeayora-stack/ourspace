<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  body { background: #000814; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 40px; font-family: 'Comic Sans MS', cursive; color: #cc55bb; }
  h2 { letter-spacing: 4px; color: #cc55bb; text-shadow: 0 0 8px #7744aa; }
  .row { display: flex; align-items: center; gap: 24px; }
  .label { font-size: 11px; color: #9977cc; letter-spacing: 2px; text-align: center; margin-top: 6px; }
  .box { display: flex; flex-direction: column; align-items: center; }
  img { image-rendering: pixelated; filter: drop-shadow(0 0 6px #cc55bb88); }
  .divider { font-size: 16px; letter-spacing: 8px; color: #3a1166; display: flex; align-items: center; gap: 10px; }
  .footer-demo { background: #0d0020; border: 1px solid #3a1166; padding: 20px 40px; border-radius: 4px; text-align: center; color: #444466; font-size: 11px; }
  .cursor-demo { background: #0d0020; border: 1px solid #3a1166; padding: 30px; border-radius: 4px; position: relative; width: 200px; height: 120px; display: flex; align-items: center; justify-content: center; color: #9977cc; font-size: 12px; }
  .cursor-img { position: absolute; top: 20px; left: 30px; }
</style>
</head>
<body>
  <h2>✦ PIXEL BEAR APERÇU ✦</h2>

  <div class="row">
    <div class="box">
      <img src="/img/bear-pixel.svg" width="16" height="16">
      <div class="label">16px</div>
    </div>
    <div class="box">
      <img src="/img/bear-pixel.svg" width="24" height="24">
      <div class="label">24px</div>
    </div>
    <div class="box">
      <img src="/img/bear-pixel.svg" width="32" height="32">
      <div class="label">32px (curseur)</div>
    </div>
    <div class="box">
      <img src="/img/bear-pixel.svg" width="48" height="48">
      <div class="label">48px</div>
    </div>
    <div class="box">
      <img src="/img/bear-pixel.svg" width="80" height="80">
      <div class="label">80px</div>
    </div>
    <div class="box">
      <img src="/img/bear-pixel.svg" width="128" height="128">
      <div class="label">128px</div>
    </div>
  </div>

  <div class="footer-demo">
    <div class="divider">
      <img src="/img/bear-pixel.svg" width="18" height="18" style="image-rendering:pixelated;filter:drop-shadow(0 0 4px #cc55bb66)">
      ✦
      <img src="/img/bear-pixel.svg" width="18" height="18" style="image-rendering:pixelated;filter:drop-shadow(0 0 4px #cc55bb66)">
    </div>
    OURSPACE 2026 — <span style="color:#cc55bb">fait avec ♥ et Comic Sans</span><br>
    <div style="margin-top:5px">Les ours ne font pas la guerre.</div>
  </div>

  <div class="cursor-demo">
    <img class="cursor-img" src="/img/bear-pixel.svg" width="26" height="26" style="image-rendering:pixelated;filter:drop-shadow(0 0 4px #cc55bb)">
    ← curseur souris
  </div>
</body>
</html>
