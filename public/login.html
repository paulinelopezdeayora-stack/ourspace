<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OURSPACE — Connexion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }

    body {
      background: #000814;
      font-family: 'Comic Sans MS', cursive;
      color: #e0e0ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #cursor { position:fixed; pointer-events:none; z-index:99999; transform:translate(-50%,-50%); font-size:20px; filter:drop-shadow(0 0 6px #ff00ff); }
    .sparkle { position:fixed; pointer-events:none; border-radius:50%; animation:sparkAnim .7s ease-out forwards; z-index:99998; }
    @keyframes sparkAnim { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0} }
    .star { position:fixed; background:white; border-radius:50%; animation:twinkle ease-in-out infinite; }
    @keyframes twinkle { 0%,100%{opacity:1} 50%{opacity:.1} }

    .logo-wrap { text-align:center; margin-bottom:28px; }
    .logo-wrap canvas { image-rendering:pixelated; filter:drop-shadow(0 0 10px #b300ff); animation:bearFloat 3s ease-in-out infinite; }
    @keyframes bearFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    .site-title { font-family:Impact,'Arial Black',sans-serif; font-size:2.6em; letter-spacing:8px; color:#ff00ff; text-shadow:0 0 8px #ff00ff,0 0 20px #b300ff; margin-top:10px; }
    .site-sub { color:#9966cc; font-size:11px; margin-top:4px; letter-spacing:2px; }

    .card { background:rgba(13,0,32,.92); border:2px solid #5500bb; border-radius:6px; width:100%; max-width:390px; padding:26px 28px; }

    .tabs { display:flex; margin-bottom:18px; gap:4px; }
    .tab { flex:1; padding:8px; text-align:center; background:#0d0020; border:1px solid #5500bb; color:#9966cc; font-family:Arial,sans-serif; font-size:13px; cursor:pointer; border-radius:3px; transition:all .15s; }
    .tab.active { background:#5500bb; color:#fff; }

    .form { display:none; }
    .form.active { display:block; }

    label { display:block; font-size:10px; color:#9966cc; text-transform:uppercase; margin-bottom:4px; margin-top:13px; }
    input[type=text], input[type=email], input[type=password] { width:100%; background:#0d001a; border:1px solid #5500bb; color:#ddd; padding:9px 11px; font-family:'Comic Sans MS',cursive; font-size:13px; border-radius:3px; }
    input:focus { outline:none; border-color:#ff00ff; box-shadow:0 0 8px #ff00ff44; }

    .btn-submit { width:100%; margin-top:18px; padding:11px; background:linear-gradient(180deg,#330066,#1a0044); color:#fff; border:1px solid #9900ff; font-family:'Comic Sans MS',cursive; font-size:14px; font-weight:bold; border-radius:3px; cursor:pointer; transition:all .2s; text-shadow:0 0 8px #ff00ff; }
    .btn-submit:hover { background:#6600cc; box-shadow:0 0 14px #b300ff; }
    .btn-submit:disabled { opacity:.5; cursor:default; }

    .error-msg { color:#ff4444; font-size:12px; margin-top:10px; text-align:center; min-height:18px; }
    .form-footer { text-align:center; margin-top:13px; font-size:11px; color:#555; }
    .form-footer a { color:#9966cc; cursor:pointer; }
    .form-footer a:hover { color:#ff00ff; }
  </style>
</head>
<body>
<div id="cursor"><img src="/img/bear-pixel.svg" width="26" height="26" style="image-rendering:pixelated"></div>
<div id="stars"></div>

<div class="logo-wrap">
  <canvas id="bear" width="64" height="64" style="width:64px;height:64px"></canvas>
  <div class="site-title">✦ OURSPACE ✦</div>
  <div class="site-sub">notre espace · notre paix · old web revival 2026</div>
</div>

<div class="card">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Connexion</div>
    <div class="tab" onclick="switchTab('register')">Inscription</div>
  </div>

  <!-- LOGIN -->
  <form class="form active" id="form-login" onsubmit="doLogin(event)">
    <label>Email</label>
    <input type="email" id="l-email" placeholder="ton@email.com" required>
    <label>Mot de passe</label>
    <input type="password" id="l-pass" placeholder="••••••••" required>
    <button class="btn-submit" type="submit">Se connecter 🐻</button>
    <div class="error-msg" id="l-error"></div>
    <div class="form-footer">Pas encore inscrit ? <a onclick="switchTab('register')">Créer un compte</a></div>
  </form>

  <!-- REGISTER -->
  <form class="form" id="form-register" onsubmit="doRegister(event)">
    <label>Pseudo <span style="color:#444">(lettres, chiffres, _)</span></label>
    <input type="text" id="r-user" placeholder="xX_MonPseudo_Xx" required>
    <label>Nom affiché</label>
    <input type="text" id="r-name" placeholder="Mon Nom Cool">
    <label>Email</label>
    <input type="email" id="r-email" placeholder="ton@email.com" required>
    <label>Mot de passe <span style="color:#444">(min 6 caractères)</span></label>
    <input type="password" id="r-pass" placeholder="••••••••" required>
    <button class="btn-submit" type="submit">Rejoindre Ourspace 🐻</button>
    <div class="error-msg" id="r-error"></div>
    <div class="form-footer">Déjà un compte ? <a onclick="switchTab('login')">Se connecter</a></div>
  </form>
</div>

<script src="/js/api.js"></script>
<script>
// Cursor
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => { cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px'; });

// Sparkles
const sc=['#ff00ff','#b300ff','#00ffff','#ff6600','#ffcc00'];
document.addEventListener('mousemove', e => {
  if (Math.random()>.5) return;
  const s=document.createElement('div'); s.className='sparkle';
  const c=sc[Math.floor(Math.random()*sc.length)], sz=Math.random()*6+4;
  s.style.cssText=`width:${sz}px;height:${sz}px;background:${c};box-shadow:0 0 6px ${c};left:${e.clientX-sz/2}px;top:${e.clientY-sz/2}px;--tx:${(Math.random()-.5)*60}px;--ty:${(Math.random()-.5)*60}px`;
  document.body.appendChild(s); setTimeout(()=>s.remove(),700);
});

// Stars
const stc=document.getElementById('stars');
for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2+.5;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;animation-duration:${Math.random()*3+1.5}s;animation-delay:${Math.random()*4}s`;stc.appendChild(s);}

// Pixel bear
(function(){
  const c=document.getElementById('bear'),ctx=c.getContext('2d'),S=8;
  const h=280,B=`hsl(${h},55%,38%)`,D=`hsl(${h},55%,24%)`,L=`hsl(${h},35%,60%)`;
  [[0,0,B,B,0,B,B,0],[0,B,D,B,B,D,B,0],[0,B,B,B,B,B,B,0],
   [B,B,'#111',B,B,'#111',B,B],[B,B,B,'#b05030','#b05030',B,B,B],
   [B,B,B,L,L,B,B,B],[0,B,B,B,B,B,B,0],[0,0,B,0,0,B,0,0]]
  .forEach((row,y)=>row.forEach((col,x)=>{if(!col)return;ctx.fillStyle=col;ctx.fillRect(x*S,y*S,S,S);}));
})();

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('form-login').classList.toggle('active',tab==='login');
  document.getElementById('form-register').classList.toggle('active',tab==='register');
}

async function doLogin(e) {
  e.preventDefault();
  const btn=e.target.querySelector('button');
  btn.disabled=true; btn.textContent='Connexion...';
  document.getElementById('l-error').textContent='';
  const {data,error}=await api.login({email:document.getElementById('l-email').value,password:document.getElementById('l-pass').value});
  if(error){document.getElementById('l-error').textContent=error;btn.disabled=false;btn.textContent='Se connecter 🐻';}
  else window.location.href='/';
}

async function doRegister(e) {
  e.preventDefault();
  const btn=e.target.querySelector('button');
  btn.disabled=true; btn.textContent='Création...';
  document.getElementById('r-error').textContent='';
  const {data,error}=await api.register({username:document.getElementById('r-user').value,display_name:document.getElementById('r-name').value,email:document.getElementById('r-email').value,password:document.getElementById('r-pass').value});
  if(error){document.getElementById('r-error').textContent=error;btn.disabled=false;btn.textContent='Rejoindre Ourspace 🐻';}
  else window.location.href='/';
}

// Déjà connecté ?
api.me().then(({data})=>{ if(data) window.location.href='/'; });
</script>
</body>
</html>
